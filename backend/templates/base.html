{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Sistema de gestión para agenda clínica psicológica"
    >

    <title>
        {% block title %}
            Agenda Clínica
        {% endblock %}
    </title>

    <link
        rel="icon"
        type="image/png"
        href="{% static 'img/logo.png' %}"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Estilos globales -->
    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/header.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/messages.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/footer.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/cards.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/buttons.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/badges.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/forms.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">

    <!-- Estilos específicos de cada pantalla -->
    {% block extra_css %}
    {% endblock %}
</head>

<body>
    {% block body %}
    {% endblock %}

    <!-- JavaScript global -->
    <script src="{% static 'js/main.js' %}"></script>

    <!-- JavaScript específico de cada pantalla -->
    {% block extra_js %}
    {% endblock %}
</body>
</html>
